<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>Medisa Mobilya Yol Tarifi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#080d16">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Medisa Yol Tarifi">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./marker.png" type="image/png" sizes="1024x1008">
  <link rel="shortcut icon" href="./marker.png" type="image/png">
  <link rel="apple-touch-icon" href="./marker.png">
  
  <meta property="og:title" content="Medisa Mobilya Yol Tarifi">
  <meta property="og:image" content="./marker.png">
  <meta property="og:type" content="website">
  
  <style>
    html {
      height: 100%;
      height: 100dvh;
      width: 100%;
      max-width: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
    }
    body {
      background-color: #080d16; color: #cccccc; text-align: center; font-family: Arial, sans-serif;
      margin: 0;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      max-height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
      overscroll-behavior-x: none;
      overscroll-behavior-y: none;
      touch-action: none;
      display: flex; flex-direction: column;
      padding-top: calc(env(safe-area-inset-top) + 45px);
      box-sizing: border-box;
    }
    .page-main {
      flex: 1 1 0;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    
    .logo { max-width: 203px; height: 88px; display: block; margin: 10px auto 6px; filter: drop-shadow(0 0 0 transparent); }
    
    .route-block {
      width: 88%;
      max-width: 360px;
      margin: 0 auto;
      text-align: left;
      box-sizing: border-box;
      flex: 0 1 auto;
      min-height: 0;
    }
    .heading-fit { display: block; width: 100%; margin: 8px 0 4px; font-size: 22px; color: #cccccc; }
    
    .red-divider {
      width: 100%; height: 3px; margin: 6px 0 12px; border-radius: 999px;
      background: linear-gradient(
        90deg,
        rgba(227,6,19,0) 0%,
        rgba(227,6,19,0.22) 14%,
        rgba(227,6,19,0.72) 42%,
        rgba(227,6,19,0.82) 52%,
        rgba(227,6,19,0.68) 62%,
        rgba(227,6,19,0.2) 88%,
        rgba(227,6,19,0) 100%
      );
    }
    .red-divider--after-maps { margin: 12px 0 0; }
    
    .map-link {
      display: flex; align-items: center; justify-content: flex-start; width: 100%;
      margin: 0 0 12px; padding: 11px 14px; font-size: 18px; color: white;
      background-color: rgba(0,0,0,0.05);
      border: 1px solid rgba(227,6,19,0.42);
      border-radius: 8px; text-decoration: none; box-sizing: border-box;
      transition: background-color 0.3s ease, border-color 0.2s ease;
    }
    .map-link:last-of-type { margin-bottom: 0; }
    .map-link:hover { border-color: rgba(227,6,19,0.62); background-color: rgba(0,0,0,0.1); }
    
    .icon-wrap {
      width: 40px; height: 38px; margin-right: 15px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .icon-wrap .icon { margin-right: 0; max-height: 100%; max-width: 100%; width: auto; height: auto; }
    .icon {
      height: 38px; width: auto; display: block; object-fit: contain; object-position: center center;
      -webkit-user-select: none; user-select: none;
    }
    .icon--yandex { clip-path: inset(0 0 4px 7px); }
    
    .promo-between {
      width: 88%;
      max-width: 360px;
      margin: 0 auto 8px;
      flex: 0 1 auto;
      min-height: 0;
      border-radius: 8px;
      overflow: hidden;
      line-height: 0;
    }
    .promo-between img {
      width: 100%;
      height: auto;
      max-height: clamp(64px, 20dvh, 168px);
      object-fit: contain;
      object-position: center bottom;
      display: block;
      vertical-align: middle;
    }

    .share-section {
      flex-shrink: 0;
      text-align: center;
      margin-top: 4px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
    }
    
    .share-heading-wrap {
      display: inline-flex;
      flex-direction: column;
      align-items: stretch;
      width: fit-content;
      max-width: 100%;
      margin: 0 auto 6px;
    }
    .share-title { font-size: 12px; color: #888; margin: 0 0 4px; text-transform: uppercase; letter-spacing: 1px; }
    .share-heading-wrap .red-divider { margin: 0 0 6px; }

    .share-buttons { display: flex; justify-content: center; gap: 16px; }
    
    .share-btn { width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; border: none; background: none; cursor: pointer; color: #cccccc; text-decoration: none; transition: all 0.2s; }
    .share-btn:hover { background: rgba(255,255,255,0.05); border-radius: 50%; }
    
    .share-btn svg { width: 26px; height: 26px; fill: currentColor; }
    .share-btn.whatsapp { color: #25D366; }

    @media (min-width: 769px) {
      body { padding-top: calc(env(safe-area-inset-top) + 28px); }
      .promo-between img {
        max-height: clamp(80px, 24dvh, 200px);
      }
    }

    @media (max-width: 768px) {
      .page-main { margin-top: 2px; }
      .promo-between {
        position: absolute;
        top: -12px;
        left: 0;
        right: 0;
        width: min(48vw, 210px);
        max-width: 210px;
        margin: 0 auto;
        z-index: 2;
        border-radius: 6px;
      }
      .promo-between img {
        max-height: min(96px, 18dvh);
      }
      .logo {
        position: relative;
        z-index: 1;
        margin-top: 72px;
        max-width: 180px;
        height: auto;
        min-height: 0;
      }
      .heading-fit { font-size: 20px; margin: 4px 0 2px; }
      .map-link { margin-bottom: 10px; padding: 10px 12px; font-size: 16px; }
      .share-section {
        margin-top: 2px;
        padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
      }
    }
  </style>
</head>
<body>
  <main class="page-main">
  <div class="promo-between">
    <img src="./medisa-magaza.png" alt="Medisa Mobilya mağaza" loading="eager" decoding="async" fetchpriority="high" />
  </div>
  <img alt="Medisa Mobilya Logo" class="logo" src="./logo-header2.svg" />
  <div class="route-block">
    <h2 class="heading-fit">Yol Tarifi İçin;</h2>
    <div class="red-divider" aria-hidden="true"></div>
    <a class="map-link" href="https://www.google.com/maps/dir/?api=1&amp;destination=41.1450388,32.6505877" target="_blank" rel="noopener noreferrer">
      <span class="icon-wrap"><img alt="Google Haritalar" class="icon" src="./google-maps.png" /></span>
      Google Haritalar İle Aç
    </a>
    <a class="map-link" href="yandexnavi://build_route_on_map?lat_to=41.1450388&amp;lon_to=32.6505877&amp;title=Medisa Mobilya" target="_blank">
      <span class="icon-wrap"><img alt="Yandex Navigasyon" class="icon icon--yandex" src="./yandex.png" /></span>
      Yandex Haritalar İle Aç
    </a>
    <div class="red-divider red-divider--after-maps" aria-hidden="true"></div>
  </div>
  </main>

  <div class="share-section">
    <div class="share-heading-wrap">
      <div class="share-title">Paylaşmak İçin</div>
      <div class="red-divider" aria-hidden="true"></div>
    </div>
    <div class="share-buttons">
      <a class="share-btn whatsapp" href="javascript:void(0)" onclick="window.open('https://wa.me/?text=' + encodeURIComponent(window.location.href), '_blank');" title="WhatsApp ile Paylaş">
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
      </a>
      
      <a class="share-btn" href="javascript:void(0)" onclick="navigator.clipboard.writeText(window.location.href); alert('Bağlantı kopyalandı!');" title="Linki Kopyala">
        <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
      </a>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js').catch(function(e) { console.log('SW fail', e); });
      });
    }
  </script>
</body>
</html>
